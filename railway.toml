[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build && php artisan optimize"

[deploy]
startCommand = "php artisan migrate --force && php artisan db:seed --force && php-fpm & nginx -g 'daemon off;'"
healthcheckPath = "/up"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
