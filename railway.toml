[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/up"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
APP_ENV = "production"
APP_DEBUG = "false"
QUEUE_CONNECTION = "database"
CACHE_STORE = "database"
SESSION_DRIVER = "database"

# Add your MAYAR_API_KEY, MAYAR_WEBHOOK_SECRET, DB_CONNECTION, APP_KEY
# and DB_DATABASE directly in the Railway variables dashboard.

# --- SERVICE DEFINITIONS ---

# 1. Main Web Service (Runs Nginx/PHP-FPM)
[[services]]
name = "web"
# Use default ServerSideUp initialization
# startCommand = "/init" (Already default in image)

# 2. Queue Worker Service (Runs php artisan queue:work)
[[services]]
name = "worker"
startCommand = "php artisan queue:work --timeout=90 --tries=3"
# Scale to 1 instance
numReplicas = 1

# 3. Schedule Worker (Cron) (Runs php artisan schedule:work)
[[services]]
name = "schedule"
startCommand = "php artisan schedule:work"
numReplicas = 1
